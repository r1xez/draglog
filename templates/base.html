{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Racing Log{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/background.css' %}">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="bg-fixed-container"></div>
    
    <div class="content-wrapper">
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'car_leaderboard' %}">Leaderboard</a>
            <a href="{% url 'my_garage' %}">My Garage</a>
            {% if user.is_authenticated %}
                <span style="color: #aaa; margin-left: 10px;">{{ user.username }}</span>
                <a href="{% url 'logout' %}" style="margin-left: 15px; color: #ff4444;">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>

        {% block content %}
        {% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
